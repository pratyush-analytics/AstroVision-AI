version: '3.8'

services:
  astrovision:
    build: .
    container_name: astrovision-ai
    ports:
      - "8080:80"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.astrovision.rule=Host(`astrovision-ai.com`)"

volumes:
  # For future database additions
  app_data:
