<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1740"/>
      <stop offset="100%" stop-color="#06040f"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0c060"/>
      <stop offset="100%" stop-color="#d4940a"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="url(#bg)"/>
  <!-- Outer ring -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="#9b6dff" stroke-width="1.5" opacity="0.6"/>
  <!-- Inner ring -->
  <circle cx="32" cy="32" r="20" fill="none" stroke="#9b6dff" stroke-width="1" opacity="0.4"/>
  <!-- Star symbol -->
  <text x="32" y="38" text-anchor="middle" font-size="22" fill="url(#gold)" font-family="serif">✦</text>
</svg>
